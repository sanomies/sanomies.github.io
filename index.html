<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="chrome=1,IE=edge" />
  <title>sanomies</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Visible bounds: scale the 440x400 stage down to 400x ~363.64. */
    #hype-wrapper {
      width: 400px;
      height: 363.6363636px;
      cursor: pointer;
    }
    #onusanohtml_hype_container {
      width: 440px;
      height: 400px;
      transform: scale(0.90909091);
      transform-origin: top left;
    }
  </style>

  <script>
    // Pause the timeline as soon as the scene loads. Must run before the Hype
    // script registers its scene, so it goes in <head>.
    window.HYPE_eventListeners = window.HYPE_eventListeners || [];
    window.HYPE_eventListeners.push({
      type: "HypeSceneLoad",
      callback: function (hypeDocument) {
        hypeDocument.pauseTimelineNamed("Main Timeline");
      }
    });
  </script>
</head>
<body>
  <div id="hype-wrapper">
    <div id="onusanohtml_hype_container" class="HYPE_document" style="position:relative;overflow:hidden;">
      <script type="text/javascript" charset="utf-8" src="onusano-html.hyperesources/onusanohtml_hype_generated_script.js?30284"></script>
    </div>
  </div>

  <script>
    (function () {
      const wrapper = document.getElementById('hype-wrapper');
      const docId = 'onusano-html';
      const timeline = 'Main Timeline';

      const getDoc = () =>
        window.HYPE && window.HYPE.documents && window.HYPE.documents[docId];

      wrapper.addEventListener('mouseenter', () => {
        const d = getDoc();
        if (d) d.continueTimelineNamed(timeline);
      });

      wrapper.addEventListener('mouseleave', () => {
        const d = getDoc();
        if (d) d.pauseTimelineNamed(timeline);
      });
    })();
  </script>
</body>
</html>
